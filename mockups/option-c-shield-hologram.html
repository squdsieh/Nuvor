<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Nuvor Mockup C — Protection Shield Hologram</title>
<style>
  :root { --red:#8b0000; --bk:#000; --w:#fff; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #000; color: #fff; font-family: 'Outfit', system-ui, sans-serif; overflow: hidden; }
  .hero { position: relative; width: 100%; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  #c { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
  .hero-ov { position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(0,0,0,0) 30%, rgba(0,0,0,0.75) 100%); z-index: 2; pointer-events: none; }
  .hero-c { position: relative; z-index: 3; text-align: center; padding: 0 20px; pointer-events: none; }
  .hero-tag { font-size: 0.8rem; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.7; margin-bottom: 1rem; }
  .hero-title { font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: clamp(1.8rem, 5vw, 4.5rem); line-height: 1.05; letter-spacing: 0.02em; text-shadow: 0 2px 24px rgba(0,0,0,0.9); }
  .hero-title .r { color: var(--red); }
  .hero-sub { margin-top: 1rem; opacity: 0.85; font-size: clamp(0.95rem, 1.3vw, 1.1rem); }
  .badge { position: fixed; top: 16px; left: 16px; z-index: 10; font-size: 12px; padding: 6px 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 999px; background: rgba(0,0,0,0.4); backdrop-filter: blur(6px); }
  a.back { position: fixed; top: 16px; right: 16px; z-index: 10; color: #fff; text-decoration: none; font-size: 12px; padding: 6px 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 999px; background: rgba(0,0,0,0.4); }
  .label { position: absolute; z-index: 4; font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 0.3em; color: #fff; padding: 4px 10px; border: 1px solid rgba(139,0,0,0.6); border-radius: 999px; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); transform: translate(-50%, -50%); opacity: 0; transition: opacity 0.35s ease; white-space: nowrap; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div class="badge">Mockup C · Protection Shield Hologram</div>
<a class="back" href="./index.html">← All mockups</a>

<section class="hero">
  <canvas id="c"></canvas>
  <div class="hero-ov"></div>
  <div class="hero-c">
    <p class="hero-tag">Abu Dhabi · United Arab Emirates</p>
    <h1 class="hero-title">FOUR LAYERS OF <span class="r">SOVEREIGNTY</span><br/>ZERO COMPROMISE</h1>
    <p class="hero-sub">Ceramic · PPF · UV · Tint — engineered as one system</p>
  </div>
  <div class="label" id="lbl-0">CERAMIC</div>
  <div class="label" id="lbl-1">PPF</div>
  <div class="label" id="lbl-2">UV</div>
  <div class="label" id="lbl-3">TINT</div>
</section>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.08);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 1.2, 6.5);
camera.lookAt(0, 0.3, 0);

// Postprocessing: bloom
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.9, 0.8, 0.2);
composer.addPass(bloom);

// --- Car silhouette (reused from hero3d.js, normalized 0..1)
const silhouette = [
  [0.10,0.65],[0.14,0.55],[0.22,0.48],[0.32,0.44],[0.40,0.38],[0.52,0.34],
  [0.62,0.36],[0.70,0.42],[0.78,0.48],[0.86,0.55],[0.90,0.62],[0.90,0.70],
  [0.80,0.72],[0.74,0.72],[0.70,0.66],[0.62,0.62],[0.54,0.62],[0.46,0.64],
  [0.38,0.66],[0.30,0.68],[0.22,0.70],[0.14,0.70],[0.10,0.68]
];
const shape = new THREE.Shape();
silhouette.forEach(([x,y],i)=>{
  // center and flip Y
  const px = (x - 0.5) * 4.0;
  const py = -(y - 0.5) * 1.8;
  if (i===0) shape.moveTo(px, py); else shape.lineTo(px, py);
});
const extrudeSettings = { depth: 1.4, bevelEnabled: true, bevelSize: 0.04, bevelThickness: 0.04, bevelSegments: 2, steps: 1, curveSegments: 16 };
const carGeo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
carGeo.center();

const carWireMat = new THREE.MeshBasicMaterial({
  color: 0xff1a1a,
  wireframe: true,
  transparent: true,
  opacity: 0.9,
});
const carFillMat = new THREE.MeshBasicMaterial({
  color: 0x1a0000,
  transparent: true,
  opacity: 0.4,
  side: THREE.FrontSide,
});

const carFill = new THREE.Mesh(carGeo, carFillMat);
const carWire = new THREE.Mesh(carGeo, carWireMat);
const car = new THREE.Group();
car.add(carFill);
car.add(carWire);
scene.add(car);

// --- Hexagonal shield (wireframe icosphere + custom shader for pulse)
const shieldGeo = new THREE.IcosahedronGeometry(2.6, 3);
const shieldMat = new THREE.ShaderMaterial({
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  uniforms: {
    uTime: { value: 0 },
    uRipple: { value: 0 },
    uRippleDir: { value: new THREE.Vector3(1,0,0) },
    uColor: { value: new THREE.Color(0xff2a2a) },
  },
  vertexShader: `
    varying vec3 vPos;
    varying vec3 vNormal;
    void main() {
      vPos = position;
      vNormal = normal;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec3 vPos;
    varying vec3 vNormal;
    uniform float uTime;
    uniform float uRipple;
    uniform vec3 uRippleDir;
    uniform vec3 uColor;

    // Fake hex grid by quantising UV
    float hex(vec3 p) {
      float a = atan(p.x, p.z);
      float r = length(p.xz);
      float cells = sin(a*6.0 + r*4.0 + uTime*0.4);
      return smoothstep(0.3, 0.9, abs(cells));
    }
    void main() {
      vec3 n = normalize(vNormal);
      float fres = pow(1.0 - abs(dot(n, vec3(0.0,0.0,1.0))), 2.0);
      float grid = hex(vPos);
      float pulse = 0.5 + 0.5*sin(uTime*1.5 + vPos.y*2.0);
      float d = dot(normalize(vPos), normalize(uRippleDir));
      float ripple = uRipple * smoothstep(0.2, 1.0, d) * (0.5 + 0.5*sin(uTime*10.0));
      float a = (fres*0.5 + grid*0.25 + pulse*0.08 + ripple*0.4);
      gl_FragColor = vec4(uColor * (0.5 + pulse*0.5 + ripple), a);
    }
  `,
});
const shield = new THREE.Mesh(shieldGeo, shieldMat);
scene.add(shield);

// Outer thin wireframe ring of the shield for readability
const shieldOutline = new THREE.LineSegments(
  new THREE.WireframeGeometry(new THREE.IcosahedronGeometry(2.6, 1)),
  new THREE.LineBasicMaterial({ color: 0x8b0000, transparent: true, opacity: 0.6 })
);
scene.add(shieldOutline);

// --- Orbiting icon nodes (4)
const nodes = [];
const nodeColors = [0xff3b3b, 0xffffff, 0xffc13b, 0x3bb0ff];
const nodeLabels = ['CERAMIC','PPF','UV','TINT'];
for (let i = 0; i < 4; i++) {
  const g = new THREE.Group();
  const core = new THREE.Mesh(
    new THREE.SphereGeometry(0.13, 16, 16),
    new THREE.MeshBasicMaterial({ color: nodeColors[i] })
  );
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(0.24, 0.018, 8, 32),
    new THREE.MeshBasicMaterial({ color: nodeColors[i], transparent: true, opacity: 0.7 })
  );
  g.add(core); g.add(ring);
  nodes.push({ group: g, ring, core, phase: (i/4) * Math.PI * 2, labelEl: document.getElementById('lbl-'+i) });
  scene.add(g);
}

// Starfield
const starGeo = new THREE.BufferGeometry();
const starPositions = [];
for (let i = 0; i < 400; i++) {
  starPositions.push((Math.random()-0.5)*40, (Math.random()-0.5)*20, (Math.random()-0.5)*40 - 10);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x553333, size: 0.03, transparent: true, opacity: 0.7 }));
scene.add(stars);

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// Project 3D point to screen coords for HTML labels
const tmpVec = new THREE.Vector3();
function projectToScreen(obj) {
  obj.getWorldPosition(tmpVec);
  tmpVec.project(camera);
  const x = (tmpVec.x * 0.5 + 0.5) * window.innerWidth;
  const y = (-tmpVec.y * 0.5 + 0.5) * window.innerHeight;
  return { x, y, z: tmpVec.z };
}

// Animate
const clock = new THREE.Clock();
let rippleFrom = 0;
let activeNode = -1;

function animate() {
  const dt = clock.getDelta();
  const t = clock.elapsedTime;

  // Car: slight bobbing and yaw
  car.rotation.y += dt * 0.35;
  car.position.y = Math.sin(t*0.8) * 0.08;
  carWire.material.opacity = 0.75 + Math.sin(t*1.2)*0.15;

  // Shield: slow rotation
  shield.rotation.y = t * 0.1;
  shield.rotation.x = Math.sin(t*0.3) * 0.1;
  shieldOutline.rotation.copy(shield.rotation);
  shieldMat.uniforms.uTime.value = t;
  shieldMat.uniforms.uRipple.value *= 0.93; // decay

  // Orbiting nodes
  const R = 2.9;
  nodes.forEach((n, i) => {
    const ang = n.phase + t * 0.4;
    const y = Math.sin(ang*2 + i) * 0.35;
    n.group.position.set(Math.cos(ang)*R, y, Math.sin(ang)*R);
    n.ring.rotation.x = t * 0.6 + i;
    n.ring.rotation.y = t * 0.4;

    // update label position
    const p = projectToScreen(n.group);
    n.labelEl.style.left = p.x + 'px';
    n.labelEl.style.top = (p.y - 26) + 'px';

    // label visible when node is closest to camera
    const dot = Math.cos(ang); // assuming camera on +z
    const visible = dot > 0.6 && p.z < 1;
    n.labelEl.style.opacity = visible ? 1 : 0;

    // when a node crosses the front, pulse the shield
    if (visible && activeNode !== i) {
      activeNode = i;
      shieldMat.uniforms.uRipple.value = 1.0;
      shieldMat.uniforms.uRippleDir.value.set(Math.cos(ang), 0, Math.sin(ang));
    }
  });
  // reset active if nothing is in front
  if (!nodes.some((n,i)=>Math.cos(n.phase + t*0.4) > 0.6)) activeNode = -1;

  stars.rotation.y += dt * 0.01;

  composer.render();
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
