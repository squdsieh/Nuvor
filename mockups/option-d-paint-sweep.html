<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Nuvor — Paint Sweep Slider</title>
<style>
  :root { --red:#8b0000; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #000; color: #fff; font-family: 'Outfit', system-ui, sans-serif; overflow: hidden; user-select: none; }

  .hero { position: relative; width: 100%; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: ew-resize; }

  /* Uncoated — dim, desaturated (bottom layer, always full width) */
  .car-base {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 0;
    filter: brightness(0.40) saturate(0.45) contrast(1.02);
  }
  /* Coated — vivid, glossy (clipped to left of handle) */
  .car-coated {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 1;
    filter: brightness(0.80) saturate(1.5) contrast(1.14);
    clip-path: inset(0 50% 0 0);
    will-change: clip-path;
  }

  /* Canvas for blade + bubbles + beads */
  #c { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

  /* Slider handle */
  .handle {
    position: absolute; top: 0; left: 50%; height: 100%;
    transform: translateX(-50%);
    z-index: 6; cursor: ew-resize; width: 44px;
    display: flex; flex-direction: column; align-items: center;
  }
  .handle-line {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 2px; height: 100%;
    background: linear-gradient(180deg,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,0.9) 15%,
      rgba(255,255,255,1.0) 50%,
      rgba(255,255,255,0.9) 85%,
      rgba(255,255,255,0) 100%);
    box-shadow: 0 0 12px rgba(255,255,255,0.55), 0 0 30px rgba(255,255,255,0.18);
  }
  .handle-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(255,255,255,0.95);
    box-shadow: 0 2px 18px rgba(0,0,0,0.7), 0 0 0 3px rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center; gap: 2px;
  }
  .handle-btn svg { width: 20px; height: 20px; fill: #111; }

  /* Labels */
  .label-before, .label-after {
    position: absolute; top: 50%; transform: translateY(-50%);
    z-index: 5; font-family: 'Orbitron', sans-serif;
    font-size: clamp(9px, 1vw, 12px); letter-spacing: 0.25em;
    padding: 5px 11px; border-radius: 999px;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.15);
    pointer-events: none; white-space: nowrap;
    transition: opacity 0.3s;
  }
  .label-before { left: 18px; opacity: 0.8; }
  .label-after  { right: 18px; opacity: 0.8; color: #ffcccc; border-color: rgba(139,0,0,0.5); }

  /* Top overlay gradient (for text readability) */
  .hero-ov {
    position: absolute; inset: 0; z-index: 3; pointer-events: none;
    background:
      linear-gradient(180deg,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.0)  22%,
        rgba(0,0,0,0.0)  65%,
        rgba(0,0,0,0.78) 100%);
  }

  /* Hero text */
  .hero-c {
    position: relative; z-index: 4; text-align: center;
    padding: 0 24px; pointer-events: none;
    margin-top: -8vh;
  }
  .hero-tag { font-size: 0.78rem; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.85; margin-bottom: 1rem; }
  .hero-title { font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: clamp(1.7rem, 4.6vw, 4.2rem); line-height: 1.06; text-shadow: 0 2px 32px rgba(0,0,0,0.95); }
  .hero-title .r { color: var(--red); }
  .hero-sub { margin-top: 0.85rem; opacity: 0.9; font-size: clamp(0.88rem, 1.15vw, 1.03rem); letter-spacing: 0.04em; }
  .hero-btns { margin-top: 2rem; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; pointer-events: all; }
  .bp { padding: 12px 28px; background: var(--red); color: #fff; text-decoration: none; border-radius: 4px; font-size: 0.88rem; letter-spacing: 0.1em; text-transform: uppercase; }
  .bs { padding: 12px 28px; border: 1px solid rgba(255,255,255,0.35); color: #fff; text-decoration: none; border-radius: 4px; font-size: 0.88rem; letter-spacing: 0.1em; text-transform: uppercase; }

  /* Hint */
  .hint {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    z-index: 10; font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;
    padding: 5px 14px; border: 1px solid rgba(255,255,255,0.14); border-radius: 999px;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(6px); opacity: 0.65;
  }

  .badge { position: fixed; top: 16px; left: 16px; z-index: 10; font-size: 11px; padding: 5px 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 999px; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); }
  a.back { position: fixed; top: 16px; right: 16px; z-index: 10; color: #fff; text-decoration: none; font-size: 11px; padding: 5px 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 999px; background: rgba(0,0,0,0.5); }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body>
<div class="badge">Option D · Paint Sweep Slider</div>
<a class="back" href="./index.html">← All mockups</a>

<section class="hero" id="hero">
  <img class="car-base"
    src="https://upload.wikimedia.org/wikipedia/commons/1/15/Chiron_Low.jpg"
    alt="" draggable="false" />
  <img class="car-coated" id="car-coated"
    src="https://upload.wikimedia.org/wikipedia/commons/1/15/Chiron_Low.jpg"
    alt="" draggable="false" />

  <canvas id="c"></canvas>

  <!-- Slider handle -->
  <div class="handle" id="handle">
    <div class="handle-line"></div>
    <div class="handle-btn">
      <svg viewBox="0 0 20 20"><path d="M7 4l-5 6 5 6V4z"/><path d="M13 4l5 6-5 6V4z"/></svg>
    </div>
  </div>

  <div class="label-before" id="lbl-before">UNCOATED</div>
  <div class="label-after"  id="lbl-after">PPF COATED</div>

  <div class="hero-ov"></div>
  <div class="hero-c">
    <p class="hero-tag">Abu Dhabi · United Arab Emirates</p>
    <h1 class="hero-title">ARCHITECTS OF <span class="r">DETAILS</span><br/>THAT DEFINE THE DIFFERENCE</h1>
    <p class="hero-sub">Premium protection solutions — automotive, fleet &amp; marine</p>
    <div class="hero-btns">
      <a href="#" class="bp">Get a Quote</a>
      <a href="#" class="bs">Explore Services →</a>
    </div>
  </div>
</section>

<div class="hint" id="hint">← Drag to compare →</div>

<script>
(() => {
  const hero    = document.getElementById('hero');
  const handle  = document.getElementById('handle');
  const coated  = document.getElementById('car-coated');
  const canvas  = document.getElementById('c');
  const ctx     = canvas.getContext('2d');
  const hint    = document.getElementById('hint');
  const lblB    = document.getElementById('lbl-before');
  const lblA    = document.getElementById('lbl-after');

  let W = 0, H = 0;
  let pos       = 0.5;   // 0..1, current divider position
  let targetPos = 0.5;   // smoothly interpolated target
  let dragging  = false;
  let prevPos   = 0.5;
  let velocity  = 0;     // drag velocity for bubble direction
  let hintShown = true;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width  = W; canvas.height = H;
    canvas.style.width  = W + 'px'; canvas.style.height = H + 'px';
  }
  window.addEventListener('resize', resize); resize();

  // ── Drag interaction ───────────────────────────────────────────────────────
  function setTarget(clientX) {
    targetPos = Math.max(0.02, Math.min(0.98, clientX / W));
  }

  hero.addEventListener('mousedown',  e => { dragging = true; setTarget(e.clientX); hideHint(); });
  window.addEventListener('mousemove', e => { if (dragging) setTarget(e.clientX); });
  window.addEventListener('mouseup',   () => { dragging = false; });

  hero.addEventListener('touchstart', e => { dragging = true; setTarget(e.touches[0].clientX); hideHint(); }, { passive: true });
  window.addEventListener('touchmove', e => { if (dragging) setTarget(e.touches[0].clientX); }, { passive: true });
  window.addEventListener('touchend',  () => { dragging = false; });

  function hideHint() {
    if (!hintShown) return; hintShown = false;
    hint.style.transition = 'opacity 0.5s';
    hint.style.opacity = '0';
  }

  // ── Particles: bubbles (spray at blade) ────────────────────────────────────
  const bubbles = [];
  function spawnBubble(x, dir) {
    if (Math.abs(velocity) < 0.001 || Math.random() > 0.35) return;
    const speed = Math.abs(velocity) * 300;
    for (let i = 0; i < 2; i++) {
      bubbles.push({
        x,
        y: H * 0.2 + Math.random() * H * 0.6,
        vx: dir * (1.5 + Math.random() * speed),
        vy: (Math.random() - 0.5) * 0.6,
        r: 1.2 + Math.random() * 3.2,
        life: 0, max: 350 + Math.random() * 500
      });
    }
  }

  // ── Particles: water beads ─────────────────────────────────────────────────
  const beads = [];
  function spawnBead() {
    if (beads.length > 70 || pos < 0.06) return;
    const x = Math.random() * pos * W;
    if (x < 5) return;
    beads.push({
      x, y: H * 0.26 + Math.random() * H * 0.4,
      vy: 0.22 + Math.random() * 0.48,
      r: 2 + Math.random() * 4.2,
      life: 0
    });
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(40, now - last); last = now;

    // Smooth the position
    prevPos  = pos;
    pos     += (targetPos - pos) * 0.12;
    velocity = pos - prevPos;

    const sx = pos * W;

    // Update DOM
    coated.style.clipPath = `inset(0 ${((1 - pos) * 100).toFixed(3)}% 0 0)`;
    handle.style.left     = sx + 'px';

    // Keep labels from overlapping handle
    const LABEL_MARGIN = 80;
    lblB.style.opacity = pos < 0.12 ? '0' : '0.85';
    lblA.style.opacity = pos > 0.88 ? '0' : '0.85';
    lblB.style.maxWidth = Math.max(0, sx - LABEL_MARGIN) + 'px';

    ctx.clearRect(0, 0, W, H);

    // Spawn effects
    if (Math.random() < 0.5) spawnBead();
    if (dragging) spawnBubble(sx, velocity > 0 ? 1 : -1);

    // ── Blade glow ──────────────────────────────────────────────────────────
    // Halo on coated side
    const haloL = ctx.createLinearGradient(sx - 55, 0, sx, 0);
    haloL.addColorStop(0, 'rgba(255,255,255,0)');
    haloL.addColorStop(1, 'rgba(200,220,255,0.06)');
    ctx.fillStyle = haloL; ctx.fillRect(sx - 55, 0, 55, H);

    // Halo on uncoated side
    const haloR = ctx.createLinearGradient(sx, 0, sx + 40, 0);
    haloR.addColorStop(0, 'rgba(180,210,255,0.10)');
    haloR.addColorStop(1, 'rgba(180,210,255,0)');
    ctx.fillStyle = haloR; ctx.fillRect(sx, 0, 40, H);

    // Core blade line
    const blade = ctx.createLinearGradient(sx - 1.5, 0, sx + 2.5, 0);
    blade.addColorStop(0,   'rgba(255,255,255,0)');
    blade.addColorStop(0.35,'rgba(255,255,255,0.75)');
    blade.addColorStop(0.65,'rgba(230,242,255,1.0)');
    blade.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.fillStyle = blade; ctx.fillRect(sx - 1.5, 0, 4, H);

    // ── Coated-side sheen (ambient specular) ────────────────────────────────
    if (pos > 0.05) {
      const t = (now * 0.00028) % 1;
      const specX = t * sx;
      const spec = ctx.createLinearGradient(specX - 60, 0, specX + 100, 0);
      spec.addColorStop(0,    'rgba(255,255,255,0)');
      spec.addColorStop(0.3,  'rgba(255,255,255,0.035)');
      spec.addColorStop(0.5,  'rgba(255,255,255,0.08)');
      spec.addColorStop(0.7,  'rgba(255,255,255,0.035)');
      spec.addColorStop(1,    'rgba(255,255,255,0)');
      ctx.fillStyle = spec;
      ctx.fillRect(0, H * 0.25, sx, H * 0.5);
    }

    // ── Bubbles ─────────────────────────────────────────────────────────────
    for (let i = bubbles.length - 1; i >= 0; i--) {
      const b = bubbles[i];
      b.x  += b.vx * (dt / 16);
      b.y  += b.vy;
      b.life += dt;
      if (b.life > b.max || b.x < 0 || b.x > W) { bubbles.splice(i, 1); continue; }
      const fade = 1 - b.life / b.max;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(210,230,255,${0.6 * fade})`; ctx.lineWidth = 0.8; ctx.stroke();
      ctx.beginPath(); ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.35, 0, Math.PI * 2);
      ctx.fillStyle   = `rgba(255,255,255,${0.7 * fade})`; ctx.fill();
    }

    // ── Beads (coated side only) ─────────────────────────────────────────────
    for (let i = beads.length - 1; i >= 0; i--) {
      const b = beads[i];
      b.y   += b.vy * (dt / 16);
      b.life += dt;
      if (b.y > H * 0.82 || b.life > 3000 || b.x > sx) { beads.splice(i, 1); continue; }
      const fade = Math.max(0, 1 - b.life / 3000);
      const g = ctx.createRadialGradient(b.x - b.r * 0.3, b.y - b.r * 0.35, 0, b.x, b.y, b.r);
      g.addColorStop(0,   `rgba(255,255,255,${0.95 * fade})`);
      g.addColorStop(0.38,`rgba(215,238,255,${0.72 * fade})`);
      g.addColorStop(1,   `rgba(160,208,255,${0.15 * fade})`);
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fillStyle = g; ctx.fill();
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ── Auto-intro: animate to 65% on load so user sees the effect ─────────────
  setTimeout(() => {
    let start = null;
    const from = 0.5, to = 0.65, dur = 2200;
    function intro(ts) {
      if (!start) start = ts;
      const p = Math.min(1, (ts - start) / dur);
      const ease = 1 - Math.pow(1 - p, 3);
      targetPos = from + (to - from) * ease;
      if (p < 1) requestAnimationFrame(intro);
    }
    requestAnimationFrame(intro);
  }, 600);
})();
</script>
</body>
</html>
