<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Nuvor Mockup A — Particle PPF Unwrap</title>
<style>
  :root { --red:#8b0000; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #000; color: #fff; font-family: 'Outfit', system-ui, sans-serif; overflow: hidden; }
  .hero { position: relative; width: 100%; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  #car-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; filter: brightness(0.55) saturate(0.85); transition: filter 1.2s ease; }
  #car-bg.coated { filter: brightness(0.7) saturate(1.2); }
  #c { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
  .hero-ov { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.0) 40%, rgba(0,0,0,0.65) 100%); z-index: 2; pointer-events: none; }
  .hero-c { position: relative; z-index: 3; text-align: center; padding: 0 20px; margin-top: -12vh; }
  .hero-tag { font-size: 0.8rem; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.8; margin-bottom: 1rem; }
  .hero-title { font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: clamp(1.8rem, 5vw, 4.2rem); line-height: 1.05; text-shadow: 0 2px 30px rgba(0,0,0,0.9); }
  .hero-title .r { color: var(--red); }
  .hero-sub { margin-top: 0.8rem; opacity: 0.9; font-size: clamp(0.9rem, 1.2vw, 1.05rem); }
  .badge { position: fixed; top: 16px; left: 16px; z-index: 10; font-size: 11px; padding: 5px 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 999px; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); }
  .controls { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 8px; }
  .controls button { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 14px; border-radius: 999px; font: inherit; font-size: 12px; cursor: pointer; }
  .controls button:hover { background: rgba(139,0,0,0.4); border-color: var(--red); }
  a.back { position: fixed; top: 16px; right: 16px; z-index: 10; color: #fff; text-decoration: none; font-size: 11px; padding: 5px 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 999px; background: rgba(0,0,0,0.5); }
  .phase-label { position: fixed; bottom: 52px; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.5; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Outfit:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>
<div class="badge">Option A · Particle PPF Unwrap</div>
<a class="back" href="./index.html">← All mockups</a>
<section class="hero">
  <img id="car-bg"
    src="https://upload.wikimedia.org/wikipedia/commons/1/15/Chiron_Low.jpg"
    alt="Bugatti Chiron" />
  <canvas id="c"></canvas>
  <div class="hero-ov"></div>
  <div class="hero-c">
    <p class="hero-tag">Abu Dhabi · United Arab Emirates</p>
    <h1 class="hero-title">ARCHITECTS OF <span class="r">DETAILS</span><br/>THAT DEFINE THE DIFFERENCE</h1>
    <p class="hero-sub">Premium paint protection — wrap, coat, shield.</p>
  </div>
</section>
<div class="phase-label" id="phase-label">Forming</div>
<div class="controls"><button id="replay">Replay</button></div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const bg = document.getElementById('car-bg');
  const phaseLabel = document.getElementById('phase-label');
  let W = 0, H = 0;
  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize); resize();

  // Simplified car silhouette (same 40 pts from hero3d.js, normalized 0-1)
  const sil = [
    [0.10,0.65],[0.13,0.56],[0.20,0.48],[0.30,0.44],[0.40,0.38],[0.52,0.34],
    [0.63,0.36],[0.70,0.42],[0.78,0.48],[0.86,0.55],[0.90,0.62],[0.90,0.70],
    [0.80,0.72],[0.74,0.72],[0.70,0.66],[0.62,0.62],[0.54,0.62],[0.46,0.64],
    [0.38,0.66],[0.30,0.68],[0.22,0.70],[0.14,0.70],[0.10,0.68]
  ];

  function pointInPoly(x, y) {
    let inside = false;
    for (let i = 0, j = sil.length - 1; i < sil.length; j = i++) {
      const [xi, yi] = sil[i], [xj, yj] = sil[j];
      if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
    }
    return inside;
  }

  function randomOnCar() {
    for (let k = 0; k < 40; k++) {
      const x = 0.10 + Math.random() * 0.80, y = 0.34 + Math.random() * 0.38;
      if (pointInPoly(x, y)) return [x, y];
    }
    return sil[(Math.random() * sil.length) | 0];
  }

  function project(nx, ny) {
    const w = Math.min(W * 0.85, 1100), h = w * 0.42;
    const ox = (W - w) / 2, oy = (H - h) / 2 + H * 0.04;
    return [ox + nx * w, oy + ny * h];
  }

  const N = 2400;
  const parts = [];
  let phase = 'form', t0 = performance.now();
  const beads = [];

  function init() {
    parts.length = 0; beads.length = 0;
    bg.classList.remove('coated');
    for (let i = 0; i < N; i++) {
      const [tx, ty] = randomOnCar();
      parts.push({ x: Math.random(), y: Math.random(), tx, ty, a: 0.4 + Math.random() * 0.6 });
    }
    phase = 'form'; t0 = performance.now();
    phaseLabel.textContent = 'Forming';
  }
  init();

  function drawSilhouette(alpha = 1) {
    ctx.save();
    ctx.beginPath();
    sil.forEach(([x, y], i) => {
      const [px, py] = project(x, y);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    });
    ctx.closePath();
    ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.3})`;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }

  function clipToSil(fn) {
    ctx.save();
    ctx.beginPath();
    sil.forEach(([x, y], i) => {
      const [px, py] = project(x, y);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    });
    ctx.closePath();
    ctx.clip();
    fn();
    ctx.restore();
  }

  function drawFilm(progress) {
    const [x0, y0] = project(0.10, 0.34), [x1, y1] = project(0.90, 0.72);
    const w = x1 - x0, h = y1 - y0;
    clipToSil(() => {
      // translucent PPF film coverage
      const g1 = ctx.createLinearGradient(x0, y0, x0 + w * progress, y0);
      g1.addColorStop(0, 'rgba(200,230,255,0.08)');
      g1.addColorStop(0.85, 'rgba(200,230,255,0.12)');
      g1.addColorStop(1.0, 'rgba(255,255,255,0.0)');
      ctx.fillStyle = g1;
      ctx.fillRect(x0, y0, w * progress, h);

      // leading shimmer edge
      const edgeX = x0 + w * progress;
      const g2 = ctx.createLinearGradient(edgeX - 30, 0, edgeX + 10, 0);
      g2.addColorStop(0, 'rgba(255,255,255,0)');
      g2.addColorStop(0.6, 'rgba(255,255,255,0.55)');
      g2.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g2;
      ctx.fillRect(edgeX - 30, y0, 40, h);
    });
  }

  function spawnBead() {
    const x = 0.15 + Math.random() * 0.70, y = 0.38 + Math.random() * 0.20;
    beads.push({ x, y, vy: 0.0004 + Math.random() * 0.0006, r: 1.5 + Math.random() * 2.5, life: 0 });
  }

  function drawBeads(dt) {
    if (Math.random() < 0.5) spawnBead();
    for (let i = beads.length - 1; i >= 0; i--) {
      const b = beads[i];
      b.y += b.vy * dt * 60; b.life += dt;
      if (b.y > 0.74 || b.life > 3000) { beads.splice(i, 1); continue; }
      const [px, py] = project(b.x, b.y);
      ctx.beginPath(); ctx.arc(px, py, b.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(200,230,255,0.7)'; ctx.fill();
      ctx.beginPath(); ctx.arc(px - b.r * 0.3, py - b.r * 0.35, b.r * 0.38, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.fill();
    }
  }

  let last = performance.now();
  function loop(now) {
    const dt = Math.min(40, now - last); last = now;
    const elapsed = now - t0;

    if (phase === 'form' && elapsed > 3500) { phase = 'breathe'; t0 = now; phaseLabel.textContent = 'PPF Application'; }
    else if (phase === 'breathe' && elapsed > 500) { phase = 'unwrap'; t0 = now; }
    else if (phase === 'unwrap' && elapsed > 2400) { phase = 'bead'; t0 = now; bg.classList.add('coated'); phaseLabel.textContent = 'Hydrophobic Surface'; }
    else if (phase === 'bead' && elapsed > 4500) init();

    ctx.clearRect(0, 0, W, H);

    const formT = phase === 'form' ? Math.min(1, elapsed / 3500) : 1;
    const k = 1 - Math.pow(1 - formT, 3);

    // particles — rendered as crisp holographic dots over photo
    for (let i = 0; i < parts.length; i++) {
      const p = parts[i];
      const [tx, ty] = project(p.tx, p.ty);
      const sx = p.x * W, sy = p.y * H;
      const x = sx + (tx - sx) * k, y = sy + (ty - sy) * k;
      const breathe = phase !== 'form' ? Math.sin(now * 0.002 + i * 0.012) * 0.5 : 0;
      const sweep = (Math.sin(now * 0.0013 + p.tx * 6) + 1) / 2;
      const red = Math.min(1, k * 1.3) * sweep;
      const alpha = p.a * (0.35 + 0.65 * k);
      ctx.fillStyle = `rgba(${180 + red * 65},${55 - red * 40},${55 - red * 45},${alpha})`;
      ctx.fillRect(x + breathe, y, 1.5, 1.5);
    }

    drawSilhouette(k);

    if (phase === 'unwrap') drawFilm(Math.min(1, elapsed / 2400));
    else if (phase === 'bead') { drawFilm(1); drawBeads(dt); }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
  document.getElementById('replay').addEventListener('click', init);
})();
</script>
</body>
</html>
