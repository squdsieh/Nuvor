<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Nuvor Mockup A — Particle PPF Unwrap</title>
<style>
  :root { --red:#8b0000; --bk:#000; --w:#fff; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #000; color: #fff; font-family: 'Outfit', system-ui, sans-serif; }
  .hero { position: relative; width: 100%; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  #c { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
  .hero-ov { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0.8)); z-index: 2; pointer-events: none; }
  .hero-c { position: relative; z-index: 3; text-align: center; padding: 0 20px; }
  .hero-tag { font-size: 0.8rem; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.7; margin-bottom: 1rem; }
  .hero-title { font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: clamp(1.8rem, 5vw, 4.5rem); line-height: 1.05; letter-spacing: 0.02em; text-shadow: 0 2px 20px rgba(0,0,0,0.7); }
  .hero-title .r { color: var(--red); }
  .hero-sub { margin-top: 1rem; opacity: 0.85; font-size: clamp(0.95rem, 1.3vw, 1.1rem); }
  .badge { position: fixed; top: 16px; left: 16px; z-index: 10; font-size: 12px; padding: 6px 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 999px; background: rgba(0,0,0,0.4); backdrop-filter: blur(6px); }
  .controls { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 8px; }
  .controls button { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 14px; border-radius: 999px; font: inherit; font-size: 12px; cursor: pointer; backdrop-filter: blur(6px); }
  .controls button:hover { background: rgba(139,0,0,0.4); border-color: var(--red); }
  a.back { position: fixed; top: 16px; right: 16px; z-index: 10; color: #fff; text-decoration: none; font-size: 12px; padding: 6px 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 999px; background: rgba(0,0,0,0.4); }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body>
<div class="badge">Mockup A · Particle PPF Unwrap (Canvas 2D)</div>
<a class="back" href="./index.html">← All mockups</a>

<section class="hero">
  <canvas id="c"></canvas>
  <div class="hero-ov"></div>
  <div class="hero-c">
    <p class="hero-tag">Abu Dhabi · United Arab Emirates</p>
    <h1 class="hero-title">ARCHITECTS OF <span class="r">DETAILS</span><br/>THAT DEFINE THE DIFFERENCE</h1>
    <p class="hero-sub">Premium paint protection — wrap, coat, shield.</p>
  </div>
</section>

<div class="controls">
  <button id="replay">Replay</button>
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W=0, H=0, DPR = Math.min(window.devicePixelRatio || 1, 2);

  // Simple sports-car silhouette control points (normalized 0..1)
  const silhouette = [
    [0.10,0.65],[0.14,0.55],[0.22,0.48],[0.32,0.44],[0.40,0.38],[0.52,0.34],
    [0.62,0.36],[0.70,0.42],[0.78,0.48],[0.86,0.55],[0.90,0.62],[0.90,0.70],
    [0.80,0.72],[0.74,0.72],[0.70,0.66],[0.62,0.62],[0.54,0.62],[0.46,0.64],
    [0.38,0.66],[0.30,0.68],[0.22,0.70],[0.14,0.70],[0.10,0.68]
  ];

  const N = 2200; // lightweight for mockup
  const parts = [];
  let phase = 'form'; // form → settle → unwrap → bead → loop
  let t0 = performance.now();

  function resize() {
    W = canvas.clientWidth = window.innerWidth;
    H = canvas.clientHeight = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize); resize();

  function pointOnSilhouette() {
    // random point inside polygon by rejection with bounding box (cheap & fine for mockup)
    const minX=0.10, maxX=0.90, minY=0.34, maxY=0.72;
    for (let k=0;k<20;k++){
      const x = minX + Math.random()*(maxX-minX);
      const y = minY + Math.random()*(maxY-minY);
      if (pointInPoly(x,y)) return [x,y];
    }
    return silhouette[(Math.random()*silhouette.length)|0];
  }
  function pointInPoly(x, y){
    let inside=false;
    for (let i=0, j=silhouette.length-1; i<silhouette.length; j=i++){
      const [xi,yi]=silhouette[i], [xj,yj]=silhouette[j];
      const intersect = ((yi>y)!=(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi);
      if (intersect) inside = !inside;
    }
    return inside;
  }

  function init(){
    parts.length = 0;
    for (let i=0;i<N;i++){
      const [tx,ty] = pointOnSilhouette();
      parts.push({
        x: Math.random()*1, y: Math.random()*1,
        tx, ty,
        vx: 0, vy: 0,
        a: 0.3 + Math.random()*0.7,
      });
    }
    phase = 'form'; t0 = performance.now();
  }
  init();

  function project(nx, ny){
    // center the car in a max 1200px wide box
    const w = Math.min(W*0.9, 1200), h = w*0.45;
    const ox = (W - w)/2, oy = (H - h)/2 + 20;
    return [ox + nx*w, oy + ny*h];
  }

  // A diagonal shimmer "film" overlay for the unwrap phase
  function drawFilm(progress){
    const w = Math.min(W*0.9, 1200), h = w*0.45;
    const ox = (W - w)/2, oy = (H - h)/2 + 20;
    // clip to silhouette shape
    ctx.save();
    ctx.beginPath();
    silhouette.forEach(([x,y],i)=>{
      const [px,py] = [ox + x*w, oy + y*h];
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    });
    ctx.closePath();
    ctx.clip();

    // film fill
    const grd = ctx.createLinearGradient(ox, oy, ox+w, oy+h);
    grd.addColorStop(0, 'rgba(255,255,255,0.00)');
    grd.addColorStop(Math.max(0, progress-0.15), 'rgba(255,255,255,0.00)');
    grd.addColorStop(progress, 'rgba(255,255,255,0.22)');
    grd.addColorStop(Math.min(1, progress+0.03), 'rgba(255,255,255,0.45)');
    grd.addColorStop(Math.min(1, progress+0.18), 'rgba(255,255,255,0.10)');
    grd.addColorStop(1, 'rgba(255,255,255,0.04)');
    ctx.fillStyle = grd;
    ctx.fillRect(ox, oy, w, h);

    // subtle horizontal shimmer band traveling with the unwrap
    const bandX = ox + progress*w;
    const grd2 = ctx.createLinearGradient(bandX-40, 0, bandX+40, 0);
    grd2.addColorStop(0,'rgba(255,255,255,0)');
    grd2.addColorStop(0.5,'rgba(255,255,255,0.45)');
    grd2.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle = grd2;
    ctx.fillRect(bandX-40, oy, 80, h);

    ctx.restore();

    // outline the car for readability
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    silhouette.forEach(([x,y],i)=>{
      const [px,py] = [ox + x*w, oy + y*h];
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    });
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  // Water beads during 'bead' phase
  const beads = [];
  function spawnBead(){
    const x = 0.15 + Math.random()*0.7, y = 0.38 + Math.random()*0.25;
    beads.push({x, y, vy: 0.0005 + Math.random()*0.0008, r: 1 + Math.random()*2.2, life: 0});
  }
  function drawBeads(dt){
    if (Math.random() < 0.35) spawnBead();
    for (let i=beads.length-1;i>=0;i--){
      const b = beads[i];
      b.y += b.vy * dt * 60;
      b.life += dt;
      if (b.y > 0.78 || b.life > 3500) { beads.splice(i,1); continue; }
      const [px,py] = project(b.x, b.y);
      ctx.beginPath();
      ctx.arc(px, py, b.r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(200,230,255,0.75)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(px - b.r*0.3, py - b.r*0.3, b.r*0.4, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fill();
    }
  }

  let last = performance.now();
  function loop(now){
    const dt = Math.min(50, now - last); last = now;
    const elapsed = now - t0;

    // Phase machine timings
    if (phase === 'form' && elapsed > 3500) { phase = 'settle'; t0 = now; }
    else if (phase === 'settle' && elapsed > 600) { phase = 'unwrap'; t0 = now; }
    else if (phase === 'unwrap' && elapsed > 2200) { phase = 'bead'; t0 = now; }
    else if (phase === 'bead' && elapsed > 4000) { init(); } // loop

    // clear
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.fillRect(0,0,W,H);

    // particles
    const formT = phase === 'form' ? Math.min(1, elapsed/3500) : 1;
    const ease = t => 1 - Math.pow(1-t, 3);
    const k = ease(formT);

    for (let i=0;i<parts.length;i++){
      const p = parts[i];
      const [tx,ty] = project(p.tx, p.ty);
      const [sx,sy] = [p.x*W, p.y*H];
      const x = sx + (tx - sx) * k;
      const y = sy + (ty - sy) * k;
      const breathe = phase !== 'form' ? (Math.sin(now*0.002 + i*0.01)*0.6) : 0;
      // red color sweep during form→settle
      const sweep = (Math.sin(now*0.0012 + p.tx*6) + 1)/2;
      const red = Math.min(1, k*1.2) * sweep;
      const alpha = p.a * (0.4 + 0.6*k);
      ctx.fillStyle = `rgba(${180 + red*60}, ${60 - red*40}, ${60 - red*50}, ${alpha})`;
      ctx.fillRect(x + breathe, y, 1.4, 1.4);
    }

    // film unwrap
    if (phase === 'unwrap') {
      const u = Math.min(1, elapsed/2200);
      drawFilm(u);
    } else if (phase === 'bead') {
      drawFilm(1);
      drawBeads(dt);
    } else if (phase === 'settle') {
      // faint full-body film preview
      drawFilm(0.02);
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  document.getElementById('replay').addEventListener('click', init);
})();
</script>
</body>
</html>
